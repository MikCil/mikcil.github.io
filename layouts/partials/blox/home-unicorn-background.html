{{ $block := .wcBlock | default . }}
{{ $content := $block.content }}
{{ if not (reflect.IsMap $content) }}{{ $content = dict }}{{ end }}
{{ $projectID := index $content "project_id" | default "XPSEx1lcpO1HLSIWpza8" }}

<style>
  html,
  body {
    background: #000;
  }

  .home-unicorn-stage {
    position: absolute !important;
    top: 84px;
    right: 0;
    left: 0;
    z-index: 0;
    height: calc(100vh - 84px);
    min-height: 720px;
    padding: 0 !important;
    margin: 0 !important;
    overflow: hidden;
    pointer-events: auto;
    background: #000 !important;
  }

  section:not(.home-unicorn-stage):has(> .home-unicorn-stage),
  div:not(.home-unicorn-stage):has(> .home-unicorn-stage) {
    height: 0 !important;
    min-height: 0 !important;
    padding: 0 !important;
    margin: 0 !important;
    overflow: visible !important;
    background: transparent !important;
  }

  .home-unicorn-stage > * {
    height: 100%;
  }

  .home-unicorn-stage [data-us-project] {
    position: absolute;
    top: 50%;
    right: 0;
    width: min(74vw, 1420px);
    height: 100%;
    min-height: 720px;
    transform: translateY(-50%);
  }

  .home-unicorn-stage::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(90deg, #000 0%, rgba(0, 0, 0, 0.96) 30%, rgba(0, 0, 0, 0.58) 58%, rgba(0, 0, 0, 0.08) 100%),
      linear-gradient(180deg, rgba(0, 0, 0, 0.88) 0%, rgba(0, 0, 0, 0) 30%);
  }

  .home-unicorn-section {
    position: relative;
    z-index: 1;
    min-height: calc(100vh - 84px);
    overflow: hidden;
    isolation: isolate;
    pointer-events: none;
    background: transparent !important;
  }

  .home-unicorn-section a,
  .home-unicorn-section button {
    pointer-events: auto;
  }

  .home-unicorn-section > :first-child {
    max-width: min(58vw, 1040px) !important;
    margin-left: clamp(1.5rem, 6vw, 7rem) !important;
    margin-right: auto !important;
  }

  .home-unicorn-section .text-center {
    text-align: left !important;
  }

  .home-unicorn-section .justify-center {
    justify-content: flex-start !important;
  }

  .home-unicorn-section .justify-items-center {
    justify-items: start !important;
  }

  .home-unicorn-section .mx-auto,
  .home-unicorn-section img[class*="rounded"] {
    margin-left: 0 !important;
    margin-right: 0 !important;
  }

  @media (max-width: 768px) {
    .home-unicorn-stage {
      top: 64px;
      height: 100vh;
      min-height: 100vh;
      opacity: 0.46;
    }

    .home-unicorn-stage [data-us-project] {
      right: -36vw;
      width: 132vw;
      min-height: 100vh;
    }

    .home-unicorn-section {
      min-height: auto;
    }

    .home-unicorn-section > :first-child {
      max-width: none !important;
      margin-left: 1.25rem !important;
      margin-right: 1.25rem !important;
    }
  }
</style>

<div class="home-unicorn-stage">
  <div
    data-us-project="{{ $projectID }}"
    data-us-production="true"
    data-us-dpi="1.5"
    data-us-scale="1"
    data-us-alttext="Interactive abstract WebGL figure"
    style="width: 100%; height: 100%;"
  ></div>
</div>
<script>
  !function(){var u=window.UnicornStudio;if(u&&u.init){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){u.init()})}else{u.init()}}else{window.UnicornStudio={isInitialized:!1};var i=document.createElement("script");i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.2.5/dist/unicornStudio.umd.js",i.onload=function(){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){UnicornStudio.init()})}else{UnicornStudio.init()}},(document.head||document.body).appendChild(i)}}();
</script>
